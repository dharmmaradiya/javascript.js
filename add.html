<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>document</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}
.card{
    border-radius:15px;
}
.btn-custom{
    background:#242629;
    color:white;
}
.btn-custom:hover{
    background:#303234;
}
</style>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Add Task</h3>

        <div class="mb-3">
            <input type="text" id="title" class="form-control" placeholder="Task Title">
        </div>

        <div class="mb-3">
            <textarea id="description" class="form-control" placeholder="Task Description"></textarea>
        </div>

        <div class="mb-3">
            <input type="date" id="dueDate" class="form-control">
        </div>

        <div class="mb-3">
            <select id="priority" class="form-select">
                <option value="">Select Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>

        <button onclick="addTask()" class="btn btn-custom w-100">Add Task</button>

        <div class="text-center mt-3">
            <a href="view.html">View Tasks</a>
        </div>
    </div>
</div>

<script>

function addTask(){

    let title = document.getElementById("title").value;
    let description = document.getElementById("description").value;
    let dueDate = document.getElementById("dueDate").value;
    let priority = document.getElementById("priority").value;

    if(title === "" || dueDate === ""){
        alert("Title and Due Date Required!");
        return;
    }

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    let newTask = {
        id: Date.now(),
        title,
        description,
        dueDate,
        priority
    };

    tasks.push(newTask);

    localStorage.setItem("tasks", JSON.stringify(tasks));

    window.location.href="view.html";
}

</script>

</body>
</html>
